version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booknest-db
    environment:
      POSTGRES_USER: ${DB_USER:-booknest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booknest_password}
      POSTGRES_DB: ${DB_NAME:-booknest}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U booknest']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booknest-network

  redis:
    image: redis:7-alpine
    container_name: booknest-redis
    ports:
      - '6379:6379'
    networks:
      - booknest-network

volumes:
  postgres_data:

networks:
  booknest-network:
    driver: bridge
